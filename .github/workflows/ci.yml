name: ci
on:
  pull_request:
    branches: [ main ]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
      - run: go test ./...
      - run: go vet ./...

  docker-buildx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx build --platform linux/amd64 -f Dockerfile.api -t finpay-api:ci --load .
      - run: docker buildx build --platform linux/amd64 -f Dockerfile.client -t finpay-client:ci --load .
